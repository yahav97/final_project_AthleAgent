[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
markers =
    unit: Pure unit tests — no network, Firestore, or real model artifacts.
    integration: HTTP / end-to-end tests that exercise FastAPI routes.
    slow: Tests that load real model artifacts or heavy ML dependencies.
