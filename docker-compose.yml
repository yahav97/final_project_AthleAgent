services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      FIREBASE_SERVICE_ACCOUNT_KEY: /app/backend/firebase-key.json
      LOG_DIR: /app/logs
    volumes:
      - ./backend/firebase-key.json:/app/backend/firebase-key.json:ro
      - ./logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').getcode()",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
